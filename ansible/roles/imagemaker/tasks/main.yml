---
- name: Imagemaker dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ service_user }}"
    mode: "0755"
  loop:
    - "{{ install_root }}/imagemaker"
    - /var/lib/imagemaker/cache
    - /var/lib/imagemaker/builds
    - /var/lib/imagemaker/dist

- name: Copy imagemaker sources
  ansible.builtin.copy:
    src: "{{ repo_root }}/components/imagemaker/{{ item.f }}"
    dest: "{{ install_root }}/imagemaker/{{ item.f }}"
    mode: "{{ item.m }}"
    owner: "{{ service_user }}"
  loop:
    - { f: server.js,   m: "0644" }
    - { f: index.html,  m: "0644" }
    - { f: build-image.sh, m: "0755" }
    - { f: prebuild.sh, m: "0755" }

# Root-owned helper for the one fixed DB query, so sudo can be scoped to it instead of `docker`.
- name: Install ob-fleets root helper
  ansible.builtin.copy:
    src: "{{ repo_root }}/components/imagemaker/ob-fleets.sh"
    dest: /usr/local/bin/ob-fleets
    owner: root
    group: root
    mode: "0755"

# Scoped to exactly what a build needs. Note: NO /usr/bin/cp (unrestricted root overwrite) and
# NO /usr/bin/docker (host root); the DB read goes through /usr/local/bin/ob-fleets, and the
# boot partition is mounted uid=<service_user> so the config copy runs unprivileged.
- name: Passwordless sudo for imagemaker ops (scoped)
  ansible.builtin.copy:
    dest: /etc/sudoers.d/imagemaker
    mode: "0440"
    content: "{{ service_user }} ALL=(root) NOPASSWD: /usr/sbin/losetup, /usr/bin/mount, /usr/bin/umount, /usr/sbin/partprobe, /usr/sbin/blkid, /usr/local/bin/ob-fleets\n"
    validate: visudo -cf %s

- name: Install imagemaker.service
  ansible.builtin.template:
    src: imagemaker.service.j2
    dest: /etc/systemd/system/imagemaker.service
    mode: "0644"
  notify: restart imagemaker

- name: Enable imagemaker
  ansible.builtin.systemd:
    name: imagemaker
    enabled: true
    state: started
    daemon_reload: true

- name: Note — the service user's balena CLI must be logged into your openBalena backend
  ansible.builtin.debug:
    msg: "Run as {{ service_user }}: BALENARC_BALENA_URL={{ dns_tld }} balena login --credentials  (once)"
